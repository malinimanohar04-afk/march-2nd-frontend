<html>
  <head>
    <title>Learn Flex</title>
    <style>
      .one {
        height: 200px;
        width: 300px;
        background-color: blueviolet;
        font-size: 150px;
        text-align: center;
        border: 2px solid black;
      }
      .two {
        height: 200px;
        width: 300px;
        background-color: yellow;
        font-size: 150px;
        text-align: center;
        border: 2px solid black;
      }
      .three {
        height: 200px;
        width: 300px;
        background-color: green;
        font-size: 150px;
        text-align: center;
        border: 2px solid black;
      }
      .main {
        height: 1000px;
        border: 4px solid blue;
        display: flex;
        flex-direction: row-reverse;
        justify-content: space-around;
        align-items: start;
        flex-wrap: wrap;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="one">1</div>
      <div class="two">2</div>
      <div class="three">3</div>
    </div>
  </body>
</html>

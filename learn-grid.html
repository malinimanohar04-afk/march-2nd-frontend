<html>
  <head>
    <title>Learn Grid</title>
    <style>
      .one {
        height: 200px;
        width: auto; /* automatically it occupies the place given to it */
        background-color: red;
        font-size: 150px;
        text-align: center;
      }
      .two {
        height: 200px;
        width: auto;
        background-color: blueviolet;
        font-size: 150px;
        text-align: center;
      }
      .three {
        height: 200px;
        width: auto;
        background-color: yellow;
        font-size: 150px;
        text-align: center;
      }
      .four {
        height: 200px;
        width: auto;
        background-color: cyan;
        font-size: 150px;
        text-align: center;
      }
      .main {
        display: grid; /* dividing the elements into particular blocks */
        grid-template-columns: 30% 70%;
      }
    </style>
  </head>
  <body>
    <div class="main">
      <div class="one">1</div>
      <div class="two">2</div>
      <div class="three">3</div>
      <div class="four">4</div>
    </div>
  </body>
</html>
